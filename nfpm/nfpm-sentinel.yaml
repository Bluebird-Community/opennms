# nfpm config for the BluebirdOps Sentinel package (bbo-sentinel).
# See nfpm-core.yaml for the shared conventions (env expansion, version_schema,
# per-packager overrides).
name: bbo-sentinel
arch: ${ARCH}
platform: linux
version: ${OPENNMS_VERSION}
version_schema: semver
release: ${PKG_RELEASE}
maintainer: "Maintainer <${MAINTAINER_EMAIL}>"
description: BluebirdOps services to horizontally scale backend workloads
homepage: https://github.com/bluebird-community/opennms

contents:
  # Each top-level child of /opt/sentinel mapped once (etc as config, the rest as
  # regular files); nfpm rejects overlapping content entries as a collision and
  # has no per-entry exclude. Keep in sync with the buildroot tree.
  - src: target/artifacts/buildroot/sentinel/opt/sentinel/agent
    dst: /opt/sentinel/agent
  - src: target/artifacts/buildroot/sentinel/opt/sentinel/bin
    dst: /opt/sentinel/bin
  - src: target/artifacts/buildroot/sentinel/opt/sentinel/COPYING
    dst: /opt/sentinel/COPYING
  - src: target/artifacts/buildroot/sentinel/opt/sentinel/data
    dst: /opt/sentinel/data
  - src: target/artifacts/buildroot/sentinel/opt/sentinel/debian
    dst: /opt/sentinel/debian
  - src: target/artifacts/buildroot/sentinel/opt/sentinel/lib
    dst: /opt/sentinel/lib
  - src: target/artifacts/buildroot/sentinel/opt/sentinel/system
    dst: /opt/sentinel/system
  - src: target/artifacts/buildroot/sentinel/opt/sentinel/etc
    dst: /opt/sentinel/etc
    type: config
  - src: target/artifacts/buildroot/sentinel/usr/lib/systemd/system
    dst: /usr/lib/systemd/system
  - dst: /var/log/sentinel
    type: dir
    file_info: { mode: 0755 }
  - dst: /var/lib/sentinel/deploy
    type: dir
    file_info: { mode: 0755 }

overrides:
  deb:
    recommends:
      - openjdk-21-jre-headless
  rpm:
    recommends:
      - java-21-openjdk-headless

scripts:
  postinstall: packages/pkg-postinst-sentinel.sh
