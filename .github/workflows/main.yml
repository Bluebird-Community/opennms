---
name: main
run-name: Build tarballs, oci and packages with test suites
on:
  workflow_dispatch:
  pull_request:
    types: [ opened, synchronize, reopened ]
  push:
    branches:
      - '*'
    tags:
      - 'v*'  # Only version tags like v1.0.0

permissions: write-all

jobs:
  decide-scope:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      full_build: ${{ steps.decide.outputs.full_build }}
      baseline_ref: ${{ steps.decide.outputs.baseline_ref }}
      trigger_reason: ${{ steps.decide.outputs.trigger_reason }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install pathspec
        run: pip install --quiet pathspec
      - name: Decide build scope
        id: decide
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REF_VAR: ${{ github.ref }}
        run: |
          set -e

          # Fail-open trap (design D8): any uncaught error -> full_build=true, exit 0.
          trap 'echo "decide-scope hit an error - defaulting to full build" >&2; \
                printf "full_build=true\nbaseline_ref=\ntrigger_reason=decide-scope-internal-failure\n" >> "$GITHUB_OUTPUT"; \
                echo "::warning title=decide-scope::internal failure - falling back to full build"; \
                exit 0' ERR

          # ---- Trip-wire list (design D3) ----
          export TRIP_WIRES='/pom.xml
          dependencies/**
          Makefile
          compile.pl
          assemble.pl
          tools/development/**
          .github/workflows/**
          .cicd-assets/**
          .mvn/**
          container/features/**
          pnpm-lock.yaml
          ui/pnpm-lock.yaml'

          FULL_BUILD=false
          BASELINE_REF=""
          TRIGGER_REASON=""

          # ---- Event-based baseline derivation (design D2) ----
          case "$EVENT_NAME" in
            pull_request)
              BASELINE_REF="origin/$BASE_REF"
              ;;
            push)
              if [[ "$GITHUB_REF_VAR" == refs/tags/v* ]]; then
                FULL_BUILD=true
                TRIGGER_REASON="tag-push"
              elif [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" || -z "$BEFORE_SHA" ]]; then
                FULL_BUILD=true
                TRIGGER_REASON="zero-sha-baseline"
              else
                BASELINE_REF="$BEFORE_SHA"
              fi
              ;;
            workflow_dispatch)
              FULL_BUILD=true
              TRIGGER_REASON="workflow-dispatch"
              ;;
            *)
              FULL_BUILD=true
              TRIGGER_REASON="unknown-event-$EVENT_NAME"
              ;;
          esac

          # ---- Verify baseline resolves to a commit ----
          if [[ "$FULL_BUILD" != "true" && -n "$BASELINE_REF" ]]; then
            if ! git rev-parse --verify "${BASELINE_REF}^{commit}" >/dev/null 2>&1; then
              FULL_BUILD=true
              TRIGGER_REASON="baseline-unresolvable"
            fi
          fi

          # ---- Compute changed files (scoped path only) ----
          if [[ "$FULL_BUILD" != "true" ]]; then
            CHANGED_FILES=$(git diff --name-only "${BASELINE_REF}...HEAD" || echo "")
            if [[ -z "$CHANGED_FILES" ]]; then
              FULL_BUILD=true
              TRIGGER_REASON="no-changed-files"
            fi
          fi

          # ---- Trip-wire match via pathspec (gitignore semantics; design D3) ----
          if [[ "$FULL_BUILD" != "true" ]]; then
            TRIPPED=$(printf '%s\n' "$CHANGED_FILES" | python3 -c '
          import os, sys, pathspec
          patterns = os.environ["TRIP_WIRES"].strip().splitlines()
          spec = pathspec.GitIgnoreSpec.from_lines(patterns)
          for line in sys.stdin:
              line = line.strip()
              if line and spec.match_file(line):
                  print(line)
                  break
          ')
            if [[ -n "$TRIPPED" ]]; then
              FULL_BUILD=true
              TRIGGER_REASON="trip-wire:$TRIPPED"
            fi
          fi

          # ---- [full-ci] escape hatch (design D9) ----
          if [[ "$FULL_BUILD" != "true" ]]; then
            case "$EVENT_NAME" in
              pull_request)
                COMMIT_MSGS=$(git log -1 --format=%B "$PR_HEAD_SHA" 2>/dev/null || true)
                ;;
              push)
                COMMIT_MSGS=$(git log --format=%B "${BEFORE_SHA}..${AFTER_SHA}" 2>/dev/null || true)
                ;;
              *)
                COMMIT_MSGS=$(git log -1 --format=%B HEAD 2>/dev/null || true)
                ;;
            esac
            if printf '%s' "$COMMIT_MSGS" | grep -F -q '[full-ci]'; then
              FULL_BUILD=true
              TRIGGER_REASON="full-ci-keyword"
            fi
          fi

          if [[ "$FULL_BUILD" != "true" && -z "$TRIGGER_REASON" ]]; then
            TRIGGER_REASON="scoped:$EVENT_NAME"
          fi

          # ---- Emit outputs ----
          {
            echo "full_build=$FULL_BUILD"
            echo "baseline_ref=$BASELINE_REF"
            echo "trigger_reason=$TRIGGER_REASON"
          } >> "$GITHUB_OUTPUT"

          # ---- Surface decision (task 3.7): step summary + notice + log ----
          {
            echo "## decide-scope"
            echo ""
            echo "| Output | Value |"
            echo "|---|---|"
            echo "| \`full_build\` | \`$FULL_BUILD\` |"
            echo "| \`baseline_ref\` | \`${BASELINE_REF:-<none>}\` |"
            echo "| \`trigger_reason\` | \`$TRIGGER_REASON\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::notice title=decide-scope::full_build=$FULL_BUILD baseline_ref=${BASELINE_REF:-<none>} trigger_reason=$TRIGGER_REASON"
          echo "decide-scope: full_build=$FULL_BUILD baseline_ref=${BASELINE_REF:-<none>} trigger_reason=$TRIGGER_REASON"

  build-with-smoke-test:
    if: "!contains(github.event.commits[0].message, '[skip build-with-smoke-test]')"
    needs:
      - decide-scope
    runs-on:
      group: Default
      labels:
        - self-hosted
        - Linux
        - X64
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Cleaning project for quick validation
        run: |
          make validate
      - name: Build Web UI with pnpm including tests
        run: |
          make compile-ui
      - name: Build and assemble from source without expensive tasks
        run: |
          make
      - name: Run quick smoke test
        run: |
          make smoke
      - name: Publish Quick Smoke Test Report
        if: success() || failure()
        uses: scacap/action-surefire-report@v1
        with:
          check_name: Quick Smoke Test Report
      - name: Collect build logs
        if: always()
        run: |
          make collect-testresults
      - name: Persist test results and logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-with-smoke-test-logs
          path: target/artifacts/mvn.*.log
      - name: Persist tarball Core
        uses: actions/upload-artifact@v5
        with:
          name: tarball-core
          path: opennms-full-assembly/target/opennms-full-assembly-*.tar.gz
      - name: Persist tarball Minion
        uses: actions/upload-artifact@v5
        with:
          name: tarball-minion
          path: opennms-assemblies/minion/target/org.opennms.assemblies.minion-*.tar.gz
      - name: Persist tarball Sentinel
        uses: actions/upload-artifact@v5
        with:
          name: tarball-sentinel
          path: opennms-assemblies/sentinel/target/org.opennms.assemblies.sentinel-*.tar.gz

  core-packages:
    if: "!contains(github.event.commits[0].message, '[skip core-packages]')"
    needs:
      - integration-tests
      - e2e-tests-core
      - e2e-tests-minion
      - e2e-tests-sentinel
    runs-on: ubuntu-latest
    container:
      image: quay.io/bluebird/java-builder:ubuntu.0.2.0.jdk-21.b27
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: tarball-core
          path: opennms-full-assembly/target
      - name: Build Core Debian packages
        run: make core-pkg-deb PKG_RELEASE=${{ github.run_number }}
      - name: Build Core RPM packages
        run: make core-pkg-rpm PKG_RELEASE=${{ github.run_number }}
      - name: Persist Core package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: core-pkgs
          path: |
            target/artifacts/packages/core

  minion-packages:
    if: "!contains(github.event.commits[0].message, '[skip minion-packages]')"
    needs:
      - integration-tests
      - e2e-tests-core
      - e2e-tests-minion
      - e2e-tests-sentinel
    runs-on: ubuntu-latest
    container:
      image: quay.io/bluebird/java-builder:ubuntu.0.2.0.jdk-21.b27
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: tarball-minion
          path: opennms-assemblies/minion/target
      - name: Build Minion Debian packages
        run: make minion-pkg-deb PKG_RELEASE=${{ github.run_number }}
      - name: Build Minion RPM packages
        run: make minion-pkg-rpm PKG_RELEASE=${{ github.run_number }}
      - name: Persist Minion package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: minion-pkgs
          path: |
            target/artifacts/packages/minion

  sentinel-packages:
    if: "!contains(github.event.commits[0].message, '[skip sentinel-packages]')"
    needs:
      - integration-tests
      - e2e-tests-core
      - e2e-tests-minion
      - e2e-tests-sentinel
    runs-on: ubuntu-latest
    container:
      image: quay.io/bluebird/java-builder:ubuntu.0.2.0.jdk-21.b27
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: tarball-sentinel
          path: opennms-assemblies/sentinel/target
      - name: Build Sentinel Debian packages
        run: make sentinel-pkg-deb PKG_RELEASE=${{ github.run_number }}
      - name: Build Sentinel RPM packages
        run: make sentinel-pkg-rpm PKG_RELEASE=${{ github.run_number }}
      - name: Persist Sentinel package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: sentinel-pkgs
          path: |
            target/artifacts/packages/sentinel

  core-oci:
    if: "!contains(github.event.commits[0].message, '[skip minion-oci]') || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')"
    needs:
      - integration-tests
      - e2e-tests-core
      - e2e-tests-minion
      - e2e-tests-sentinel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          cache-image: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - uses: actions/download-artifact@v6
        with:
          name: tarball-core
          path: opennms-full-assembly/target
      - name: Extract Core tarball for container build
        run: |
          mkdir -p opennms-container/core/tarball-root
          tar xzf opennms-full-assembly/target/opennms-full-assembly-*-core.tar.gz -C opennms-container/core/tarball-root
          rm -rf opennms-full-assembly/target
      - name: Get the release version for the OCI tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "TARGET=core" >> ${GITHUB_ENV}
          REF_NAME=${{ github.ref_name }}
          VERSION=${REF_NAME#v}  # Remove 'v' prefix
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Prepare
        run: |
          echo "OCI_REPOSITORY=${TARGET:-core-snapshot}" >> ${GITHUB_ENV}
          echo "SHORT_GIT_SHA=$(git rev-parse --short HEAD)" >> ${GITHUB_ENV}
          echo "GIT_SHA=$(git rev-parse HEAD)" >> ${GITHUB_ENV}
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> ${GITHUB_ENV}
          echo "TAG=${VERSION:-$(git rev-parse --short HEAD)}" >> ${GITHUB_ENV}
      - name: Build and push Core container image
        uses: docker/build-push-action@v6
        with:
          context: ./opennms-container/core
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            RELEASE_BRANCH=${{ github.ref_name }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            VERSION=${{ env.TAG }}
            REVISION=${{ env.GIT_SHA }}
            SOURCE=https://github.com/Bluebird-Community/opennms/tree/${{ env.GIT_SHA }}/opennms-container/core
            BUILD_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            BUILD_JOB_ID=${{ github.run_id }}
          tags: quay.io/bluebird/${{ env.OCI_REPOSITORY }}:${{ env.TAG }},quay.io/bluebird/${{ env.OCI_REPOSITORY }}:latest

  minion-oci:
    if: "!contains(github.event.commits[0].message, '[skip minion-oci]') || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')"
    needs:
      - integration-tests
      - e2e-tests-core
      - e2e-tests-minion
      - e2e-tests-sentinel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          cache-image: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - uses: actions/download-artifact@v6
        with:
          name: tarball-minion
          path: opennms-assemblies/minion/target
      - name: Extract Minion tarball for container build
        run: |
          mkdir -p opennms-container/minion/tarball-root
          tar xzf opennms-assemblies/minion/target/org.opennms.assemblies.minion-*-minion.tar.gz --strip-component 1 -C opennms-container/minion/tarball-root
      - name: Generate minion-config-schema
        working-directory: opennms-container/minion
        run: |
          cat minion-config-schema.yml.in | sed -e 's,@VERSION@,${{ github.sha }},' \
          -e 's,@REVISION@,${{ github.sha }},' \
          -e 's,@BRANCH@,${{ github.ref_name }},' \
          -e 's,@BUILD_NUMBER@,${{ github.run_id }},' > minion-config-schema.yml
      - name: Get the release version for the OCI tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "TARGET=minion" >> ${GITHUB_ENV}
          REF_NAME=${{ github.ref_name }}
          VERSION=${REF_NAME#v}  # Remove 'v' prefix
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Prepare
        run: |
          echo "OCI_REPOSITORY=${TARGET:-minion-snapshot}" >> ${GITHUB_ENV}
          echo "SHORT_GIT_SHA=$(git rev-parse --short HEAD)" >> ${GITHUB_ENV}
          echo "GIT_SHA=$(git rev-parse HEAD)" >> ${GITHUB_ENV}
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> ${GITHUB_ENV}
          echo "TAG=${VERSION:-$(git rev-parse --short HEAD)}" >> ${GITHUB_ENV}
      - name: Build and push Minion container image
        uses: docker/build-push-action@v6
        with:
          context: ./opennms-container/minion
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            RELEASE_BRANCH=${{ github.ref_name }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            VERSION=${{ env.TAG }}
            REVISION=${{ env.GIT_SHA }}
            SOURCE=https://github.com/Bluebird-Community/opennms/tree/${{ env.GIT_SHA }}/opennms-container/minion
            BUILD_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            BUILD_JOB_ID=${{ github.run_id }}
          tags: quay.io/bluebird/${{ env.OCI_REPOSITORY }}:${{ env.TAG }},quay.io/bluebird/${{ env.OCI_REPOSITORY }}:latest

  sentinel-oci:
    if: "!contains(github.event.commits[0].message, '[skip minion-oci]') || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')"
    needs:
      - integration-tests
      - e2e-tests-core
      - e2e-tests-minion
      - e2e-tests-sentinel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          cache-image: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - uses: actions/download-artifact@v6
        with:
          name: tarball-sentinel
          path: opennms-assemblies/sentinel/target
      - name: Extract Sentinel tarball for container build
        run: |
          mkdir -p opennms-container/sentinel/tarball-root
          tar xzf opennms-assemblies/sentinel/target/org.opennms.assemblies.sentinel-*-sentinel.tar.gz --strip-component 1 -C opennms-container/sentinel/tarball-root
      - name: Get the release version for the OCI tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "TARGET=sentinel" >> ${GITHUB_ENV}
          REF_NAME=${{ github.ref_name }}
          VERSION=${REF_NAME#v}  # Remove 'v' prefix
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Prepare
        run: |
          echo "OCI_REPOSITORY=${TARGET:-sentinel-snapshot}" >> ${GITHUB_ENV}
          echo "SHORT_GIT_SHA=$(git rev-parse --short HEAD)" >> ${GITHUB_ENV}
          echo "GIT_SHA=$(git rev-parse HEAD)" >> ${GITHUB_ENV}
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> ${GITHUB_ENV}
          echo "TAG=${VERSION:-$(git rev-parse --short HEAD)}" >> ${GITHUB_ENV}
      - name: Build and push Sentinel container image
        uses: docker/build-push-action@v6
        with:
          context: ./opennms-container/sentinel
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            RELEASE_BRANCH=${{ github.ref_name }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            VERSION=${{ env.TAG }}
            REVISION=${{ env.GIT_SHA }}
            SOURCE=https://github.com/Bluebird-Community/opennms/tree/${{ env.GIT_SHA }}/opennms-container/sentinel
            BUILD_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            BUILD_JOB_ID=${{ github.run_id }}
          tags: quay.io/bluebird/${{ env.OCI_REPOSITORY }}:${{ env.TAG }},quay.io/bluebird/${{ env.OCI_REPOSITORY }}:latest

  unit-tests:
    if: "!contains(github.event.commits[0].message, '[skip unit-tests]')"
    needs:
      - decide-scope
      - build-with-smoke-test
    strategy:
      fail-fast: false
      matrix:
        shard_idx: [ 0, 1, 2 ] # Test job index for each runner
        shards: [ 3 ]          # 3 parallel test jobs
    runs-on:
      group: Default
      labels:
        - self-hosted
        - Linux
        - X64
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Prepare the build for tests
        run: |
          make quick-compile
          make quick-assemble
      - name: Run unit test suite (shard ${{ matrix.shard_idx }})
        env:
          BASELINE_REF: ${{ needs.decide-scope.outputs.baseline_ref }}
          FULL_BUILD: ${{ needs.decide-scope.outputs.full_build }}
        run: |
          make unit-tests MAVEN_SHARD_IDX=${{ matrix.shard_idx }} MAVEN_SHARDS=${{ matrix.shards }}
      - name: Publish Unit Test Report (shard ${{ matrix.shard_idx }})
        if: success() || failure()
        uses: scacap/action-surefire-report@v1
        with:
          check_name: Unit Test Report (shard ${{ matrix.shard_idx }})
      - name: Collect test results and logs (shard ${{ matrix.shard_idx }})
        if: always()
        run: |
          make collect-testresults
      - name: Persist unit test results (shard ${{ matrix.shard_idx }})
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: unit-tests-artifacts-${{ matrix.shard_idx }}
          path: |
            target/artifacts/mvn.*.log
            target/artifacts/surefire-reports
            target/artifacts/failsafe-reports

  integration-tests:
    if: "!contains(github.event.commits[0].message, '[skip integration-tests]')"
    strategy:
      fail-fast: false
      matrix:
        shard_idx: [ 0, 1, 2, 3, 4, 5, 6, 7 ] # Test job index for each runner
        shards: [ 8 ]                         # total number of parallel test jobs
    needs:
      - decide-scope
      - unit-tests
    runs-on:
      group: Default
      labels:
        - self-hosted
        - Linux
        - X64
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Prepare the build for tests
        run: |
          make quick-compile
          make quick-assemble
      - name: Prepare the build for tests and installing it
        run: |
          make install-core
      - name: Run integration unit test suite (shard ${{ matrix.shard_idx }})
        env:
          BASELINE_REF: ${{ needs.decide-scope.outputs.baseline_ref }}
          FULL_BUILD: ${{ needs.decide-scope.outputs.full_build }}
        run: |
          make integration-tests MAVEN_SHARD_IDX=${{ matrix.shard_idx }} MAVEN_SHARDS=${{ matrix.shards }}
      - name: Publish Integration Test Report (shard ${{ matrix.shard_idx }})
        if: success() || failure()
        uses: scacap/action-surefire-report@v1
        with:
          check_name: Integration Test Report (shard ${{ matrix.shard_idx }})
      - name: Collect test results and logs (shard ${{ matrix.shard_idx }})
        if: always()
        run: |
          make collect-testresults
      - name: Persist integration test results (shard ${{ matrix.shard_idx }})
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: integration-tests-artifacts-${{ matrix.shard_idx }}
          path: |
            target/artifacts/mvn.*.log
            target/artifacts/surefire-reports
            target/artifacts/failsafe-reports

  e2e-tests-core:
    if: "needs.decide-scope.outputs.full_build == 'true' && !contains(github.event.commits[0].message, '[skip e2e-tests-core]')"
    strategy:
      fail-fast: false
      matrix:
        shard_idx: [ 0, 1, 2, 3, 4, 5, 6, 7 ] # Test job index for each runner
        shards: [ 8 ]                         # total number of parallel test jobs
    needs:
      - decide-scope
      - unit-tests
    runs-on:
      group: Default
      labels:
        - self-hosted
        - Linux
        - X64
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Prepare the build for tests
        run: |
          make quick-compile
          make quick-assemble
