# nfpm config for the BluebirdOps Core package (bbo-core).
# Consumed by `make core-pkg-deb` / `make core-pkg-rpm` (see Makefile), which
# export OPENNMS_VERSION / PKG_RELEASE / ARCH / MAINTAINER_EMAIL before invoking
# `nfpm package`. nfpm expands ${...} from the environment at load time.
#
# `version_schema: semver` is required: OPENNMS_VERSION carries `-SNAPSHOT` on
# non-release builds and RPM forbids `-` in the Version field. semver parsing
# relocates the SNAPSHOT prerelease so the RPM Version stays hyphen-free.
#
# recommends/suggests differ by packager (different distro package names), so
# they live under `overrides:` rather than the shared top-level fields.
name: bbo-core
arch: ${ARCH}
platform: linux
version: ${OPENNMS_VERSION}
version_schema: semver
release: ${PKG_RELEASE}
maintainer: "Maintainer <${MAINTAINER_EMAIL}>"
description: BluebirdOps Core services
homepage: https://github.com/bluebird-community/opennms

depends:
  - jicmp
  - jicmp6
  - jrrd2

contents:
  # Payload tree assembled by the core-pkg-buildroot Makefile target. nfpm has
  # no per-entry exclude and rejects overlapping content entries as a collision,
  # so each top-level child of /opt/opennms is mapped exactly once: everything
  # but etc as regular files, and etc as config (design D3/D4). Keep this list in
  # sync with the buildroot tree if the assembly adds a new top-level directory.
  - src: target/artifacts/buildroot/core/opt/opennms/agent
    dst: /opt/opennms/agent
  - src: target/artifacts/buildroot/core/opt/opennms/bin
    dst: /opt/opennms/bin
  - src: target/artifacts/buildroot/core/opt/opennms/data
    dst: /opt/opennms/data
  - src: target/artifacts/buildroot/core/opt/opennms/jetty-webapps
    dst: /opt/opennms/jetty-webapps
  - src: target/artifacts/buildroot/core/opt/opennms/lib
    dst: /opt/opennms/lib
  - src: target/artifacts/buildroot/core/opt/opennms/licenses
    dst: /opt/opennms/licenses
  - src: target/artifacts/buildroot/core/opt/opennms/share
    dst: /opt/opennms/share
  - src: target/artifacts/buildroot/core/opt/opennms/system
    dst: /opt/opennms/system
  - src: target/artifacts/buildroot/core/opt/opennms/etc
    dst: /opt/opennms/etc
    type: config
  - src: target/artifacts/buildroot/core/usr/lib/systemd/system
    dst: /usr/lib/systemd/system
  # Empty runtime directories (no source files) — declared explicitly so nfpm
  # includes them; postinstall chowns them to opennms:opennms.
  - dst: /var/lib/opennms/rrd
    type: dir
    file_info: { mode: 0755 }
  - dst: /var/lib/opennms/reports
    type: dir
    file_info: { mode: 0755 }
  - dst: /var/log/opennms
    type: dir
    file_info: { mode: 0755 }
  - dst: /var/lib/opennms/deploy
    type: dir
    file_info: { mode: 0755 }

overrides:
  deb:
    recommends:
      - openjdk-21-jre-headless
    suggests:
      - postgresql (>= 14.0)
      - iplike-pgsql14
      - iplike-pgsql15
      - iplike-pgsql16
      - iplike-pgsql17
      - iplike-pgsql18
  rpm:
    recommends:
      - java-21-openjdk-headless
    suggests:
      - postgresql-server >= 14.0
      - iplike-pgsql14
      - iplike-pgsql15
      - iplike-pgsql16
      - iplike-pgsql17
      - iplike-pgsql18

scripts:
  postinstall: packages/pkg-postinst-core.sh
